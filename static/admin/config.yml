local_backend: true
backend:
  name: git-gateway

media_folder: static/cats
public_folder: /cats

collections:
  - name: cats
    label: Mèo
    label_singular: Mèo
    folder: src/lib/data/cats
    create: true
    delete: true
    format: json
    slug: "{{slug}}"
    identifier_field: name
    fields:
      - { label: Tên, name: name, widget: string }
      - { label: Giống mèo, name: breed, widget: string }
      - label: Mô tả
        name: description
        widget: object
        fields:
          - { label: Tiếng Việt, name: vi, widget: text }
          - { label: English, name: en, widget: text }
      - { label: Ảnh đại diện, name: avatar, widget: image, required: false, allow_multiple: false }
      - label: Ảnh bổ sung
        name: photos
        widget: list
        required: false
        field: { label: Ảnh, name: photo, widget: image }
      - { label: Hiển thị trên trang chủ, name: featured, widget: boolean, default: false }
      - label: Chi nhánh
        name: location
        widget: select
        options:
          - { label: "Chi nhánh 1 — 1144 Đường Láng", value: location-1 }
          - { label: "Chi nhánh 2 — 86 Nguyễn Ngọc Nại", value: location-2 }
